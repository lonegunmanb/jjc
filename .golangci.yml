# Minimal golangci-lint configuration (v2 schema). Add linters here as
# the project matures; the CI workflow pins the runner version so
# behaviour stays stable until this file is updated deliberately.
version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
  exclusions:
    paths:
      - tmp
