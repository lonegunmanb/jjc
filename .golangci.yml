# Minimal golangci-lint configuration (v2 schema). Add linters here as
# the project matures; the CI workflow pins the runner version so
# behaviour stays stable until this file is updated deliberately.
version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
  settings:
    errcheck:
      # These return values are intentionally ignored throughout the
      # codebase: print failures to a log/REPL writer are not actionable,
      # and Close on a read-only file or a tracker is purely best-effort.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (*os.File).Close
        - (io.Closer).Close
        - (*github.com/lonegunmanb/jjc/internal/app/prompttmpl.Renderer).Cleanup
  exclusions:
    paths:
      - tmp
